# Servidores de Odoo (web y longpolling/websocket)
upstream odoo {
    server web:8069;
}

upstream odoochat {
    server web:8072;
}

# Mapa necesario para conexiones de websocket (LiveChat / chat en tiempo real)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_HERE; # Reemplazar con el dominio correspondiente

    # Desafío ACME de Certbot para validación de certificados Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirigir todas las peticiones HTTP a HTTPS de manera permanente
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN_HERE; # Reemplazar con el dominio correspondiente

    # Configuración de Certificados SSL (Generados por Certbot)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;

    # Parámetros de Seguridad SSL recomendados por la documentación
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 30m;

    # Timeouts aumentados para cargas de reportes grandes
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;

    # Límite máximo para subida de archivos (adjuntos grandes en Odoo)
    client_max_body_size 100M;

    # Redireccionar solicitudes de Websockets (Odoo 16+ usa /websocket para chat y bus)
    location /websocket {
        proxy_pass http://odoochat;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # Hardening HTTPS & Cookie flags para seguridad de sesión
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
        proxy_cookie_flags session_id samesite=lax secure; # Requiere nginx >= 1.19.8
    }

    # Redireccionar el tráfico HTTP general al backend de Odoo
    location / {
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
        proxy_pass http://odoo;

        # Hardening HTTPS & Cookie flags para seguridad de sesión
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
        proxy_cookie_flags session_id samesite=lax secure; # Requiere nginx >= 1.19.8
    }

    # Compresión gzip para optimización de recursos web estáticos
    gzip_types text/css text/scss text/plain text/xml application/xml application/json application/javascript;
    gzip on;
}
